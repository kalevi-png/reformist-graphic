<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How Silmy's Machine Worked</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&display=swap');
  html, body {
    margin: 0;
    padding: 0;
    background: #FAF6EF;
    font-family: 'Lora', Georgia, serif;
  }
  .wrap {
    max-width: 700px;
    margin: 0 auto;
    padding: 24px 20px;
  }
  svg {
    width: 100%;
    height: auto;
    display: block;
  }
</style>
</head>
<body>
<div class="wrap" id="content">
<svg viewBox="0 0 680 460" role="img" xmlns="http://www.w3.org/2000/svg">
<title>How Silmy's machine worked</title>
<desc>Flowchart showing the flow of bribes in the Silmy Karim immigration graft scheme, from Silmy Karim at the top down through senior officials, an internal collector, and a stalling immigration officer, to the foreign applicant at the bottom.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#8B3A3A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect x="0" y="0" width="680" height="460" fill="#FAF6EF"/>

<line x1="40" y1="36" x2="640" y2="36" stroke="#C04A2A" stroke-width="0.5"/>
<text x="40" y="26" font-size="11" fill="#8B3A3A" letter-spacing="1.5">How Silmy's Machine Worked</text>
<line x1="40" y1="44" x2="640" y2="44" stroke="#C04A2A" stroke-width="0.5"/>

<!-- STEP 1: Silmy at top -->
<rect x="190" y="58" width="300" height="74" rx="4" fill="#C04A2A"/>
<text x="340" y="81" text-anchor="middle" font-size="14" font-weight="700" fill="#FAF6EF">Silmy Karim</text>
<text x="340" y="99" text-anchor="middle" font-size="11" fill="#f0c8bc">Dir. General (later Deputy Minister) of Immigration</text>
<text x="340" y="116" text-anchor="middle" font-size="10" fill="#f0c8bc" font-style="italic">"malaikat" — Rp 100 million every Friday</text>

<line x1="340" y1="132" x2="340" y2="154" stroke="#8B3A3A" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- STEP 2: Senior officials -->
<rect x="190" y="154" width="300" height="52" rx="4" fill="#C04A2A"/>
<text x="340" y="175" text-anchor="middle" font-size="13" font-weight="700" fill="#FAF6EF">Senior Immigration officials</text>
<text x="340" y="192" text-anchor="middle" font-size="10" fill="#f0c8bc" font-style="italic">Received under internal code names</text>

<line x1="340" y1="206" x2="340" y2="228" stroke="#8B3A3A" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- STEP 3: Internal collector -->
<rect x="170" y="228" width="340" height="56" rx="4" fill="#8B3A3A"/>
<text x="340" y="249" text-anchor="middle" font-size="13" font-weight="700" fill="#FAF6EF">Internal collector</text>
<text x="340" y="266" text-anchor="middle" font-size="10" fill="#f0c8bc" font-style="italic">Pools the fees, then distributes upward</text>
<text x="340" y="279" text-anchor="middle" font-size="10" fill="#f0c8bc" font-style="italic">Head, Stay Permit Conversion Team</text>

<line x1="340" y1="284" x2="340" y2="306" stroke="#8B3A3A" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- STEP 4: Kanim officer -->
<rect x="190" y="306" width="300" height="56" rx="4" fill="#D9773D"/>
<text x="340" y="327" text-anchor="middle" font-size="13" font-weight="700" fill="#FAF6EF">Immigration office officer</text>
<text x="340" y="344" text-anchor="middle" font-size="10" fill="#fce8d8" font-style="italic">Stalls processing until paid</text>
<text x="340" y="358" text-anchor="middle" font-size="10" fill="#fce8d8" font-style="italic">Rp 1.5 million bribe per permit, outside official PNBP</text>

<line x1="340" y1="362" x2="340" y2="384" stroke="#8B3A3A" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- STEP 5: Applicant at bottom -->
<rect x="240" y="384" width="200" height="50" rx="4" fill="#e8ddd0"/>
<text x="340" y="404" text-anchor="middle" font-size="12" font-weight="700" fill="#3a3530">Foreign applicant</text>
<text x="340" y="421" text-anchor="middle" font-size="10" fill="#5a544c" font-style="italic">Goes through a broker or agent</text>

</svg>
</div>
<script>
  function sendHeight() {
    var h = document.getElementById('content').getBoundingClientRect().height;
    var payload = {};
    payload['datawrapper-height'] = { 'silmy-karim-syndicate': Math.ceil(h) + 20 };
    window.parent.postMessage(payload, '*');
  }
  window.addEventListener('load', sendHeight);
  window.addEventListener('resize', sendHeight);
  setTimeout(sendHeight, 300);
</script>
</body>
</html>
